<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Transformer | Phân tích Cảm xúc</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <div class="glass-card">
            <header>
                <h1>Sentiment Analysis</h1>
                <p class="subtitle">Mô hình Transformer phân tích cảm xúc văn bản tiếng Anh</p>
            </header>

            <div class="input-section">
                <textarea id="textInput" placeholder="Nhập câu tiếng Anh tại đây (ví dụ: This movie is absolutely amazing! hoặc The plot is quite boring...)"></textarea>
                <button id="analyzeBtn" class="analyze-btn">PHÂN TÍCH</button>
                
                <div id="loader" class="loading-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div id="resultSection" class="result-section">
                <div id="sentimentBadge" class="sentiment-badge">POSITIVE</div>
                <div class="confidence-bar">
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Độ tin cậy: <span id="confidenceValue">0%</span></p>
                </div>

                <div class="attention-container">
                    <div class="attention-header">
                        <span class="attention-title">Self-Attention Map</span>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">Trực quan hóa trọng số Attention</span>
                    </div>
                    <div id="heatmapWrapper">
                        <!-- Heatmap will be generated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
